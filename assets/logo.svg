<?xml version="1.0" encoding="UTF-8"?>
<!--
  QGo Logo
  Copyright (c) 2024 Rahul Chaube. All Rights Reserved.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="url(#bg)"/>

  <!-- Decorative circuit lines -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="1" fill="none">
    <line x1="0" y1="30" x2="60" y2="30"/>
    <line x1="60" y1="30" x2="70" y2="20"/>
    <line x1="340" y1="90" x2="400" y2="90"/>
    <line x1="330" y1="90" x2="340" y2="80"/>
  </g>

  <!-- Q letter with glow -->
  <g filter="url(#glow)">
    <text x="28" y="85" font-family="'Courier New', monospace" font-size="72"
          font-weight="900" fill="url(#grad1)" letter-spacing="-2">Q</text>
  </g>

  <!-- G letter -->
  <g filter="url(#glow)">
    <text x="85" y="85" font-family="'Courier New', monospace" font-size="72"
          font-weight="900" fill="url(#grad1)" letter-spacing="-2">G</text>
  </g>

  <!-- o letter -->
  <g filter="url(#glow)">
    <text x="148" y="85" font-family="'Courier New', monospace" font-size="72"
          font-weight="900" fill="url(#grad1)" letter-spacing="-2">o</text>
  </g>

  <!-- Vertical separator -->
  <rect x="205" y="20" width="2" height="80" rx="1" fill="url(#grad2)" opacity="0.6"/>

  <!-- Tagline text -->
  <text x="220" y="48" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        font-weight="700" fill="#ffffff" letter-spacing="1">AI CODING ASSISTANT</text>
  <text x="220" y="68" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#8b949e" letter-spacing="0.5">Multi-Agent · 50+ Models · Git-Native</text>
  <text x="220" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        fill="#7c3aed" letter-spacing="0.3">Better than Cursor.</text>

  <!-- Small copyright -->
  <text x="220" y="106" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5"
        fill="#484f58">© 2024 Rahul Chaube</text>

  <!-- Corner accent dots -->
  <circle cx="12" cy="12" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="388" cy="108" r="3" fill="#7c3aed" opacity="0.5"/>
</svg>
